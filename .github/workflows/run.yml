name: MTProxy Checker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          RUPROXY_USER: ${{ secrets.RUPROXY_USER }}
          RUPROXY_PASS: ${{ secrets.RUPROXY_PASS }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add working_mtproxy.txt dead_mtproxy.txt README.md
          git commit -m "Update MTProxy" || exit 0
          git push
